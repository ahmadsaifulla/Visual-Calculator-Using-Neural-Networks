<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ANN Visual Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>ANN Visual Calculator</h1>
      <p>Draw or upload symbols, predict each box, then calculate the equation.</p>
    </header>

    <section class="boxes-grid">
      <article class="input-box" data-key="d1" data-type="digit">
        <h2>Digit Box 1</h2>
        <label class="mode-label">Input mode
          <select class="mode-select">
            <option value="draw">Draw</option>
            <option value="upload">Upload</option>
          </select>
        </label>
        <div class="draw-panel active">
          <canvas width="280" height="280"></canvas>
        </div>
        <div class="upload-panel">
          <label class="dropzone">
            <input type="file" class="file-input" accept=".png,.jpg,.jpeg,image/png,image/jpeg">
            <span>Drop image here or click to upload</span>
          </label>
          <div class="upload-preview">No image selected</div>
        </div>
        <div class="box-actions">
          <button type="button" class="clear-btn">Clear</button>
        </div>
        <div class="prediction-display">
          <div class="prediction-symbol">—</div>
          <div class="prediction-confidence neutral">Confidence: 0%</div>
          <div class="prediction-warning"></div>
        </div>
      </article>

      <article class="input-box" data-key="op" data-type="operator">
        <h2>Operator Box 2</h2>
        <label class="mode-label">Input mode
          <select class="mode-select">
            <option value="draw">Draw</option>
            <option value="upload">Upload</option>
          </select>
        </label>
        <div class="draw-panel active">
          <canvas width="280" height="280"></canvas>
        </div>
        <div class="upload-panel">
          <label class="dropzone">
            <input type="file" class="file-input" accept=".png,.jpg,.jpeg,image/png,image/jpeg">
            <span>Drop image here or click to upload</span>
          </label>
          <div class="upload-preview">No image selected</div>
        </div>
        <div class="box-actions">
          <button type="button" class="clear-btn">Clear</button>
        </div>
        <div class="prediction-display">
          <div class="prediction-symbol">—</div>
          <div class="prediction-confidence neutral">Confidence: 0%</div>
          <div class="prediction-warning"></div>
        </div>
      </article>

      <article class="input-box" data-key="d2" data-type="digit">
        <h2>Digit Box 3</h2>
        <label class="mode-label">Input mode
          <select class="mode-select">
            <option value="draw">Draw</option>
            <option value="upload">Upload</option>
          </select>
        </label>
        <div class="draw-panel active">
          <canvas width="280" height="280"></canvas>
        </div>
        <div class="upload-panel">
          <label class="dropzone">
            <input type="file" class="file-input" accept=".png,.jpg,.jpeg,image/png,image/jpeg">
            <span>Drop image here or click to upload</span>
          </label>
          <div class="upload-preview">No image selected</div>
        </div>
        <div class="box-actions">
          <button type="button" class="clear-btn">Clear</button>
        </div>
        <div class="prediction-display">
          <div class="prediction-symbol">—</div>
          <div class="prediction-confidence neutral">Confidence: 0%</div>
          <div class="prediction-warning"></div>
        </div>
      </article>
    </section>

    <section class="controls-panel">
      <button id="calculateBtn" type="button" class="primary-btn" disabled>Calculate</button>
      <button id="resetAllBtn" type="button" class="secondary-btn">Reset All</button>
      <div id="statusLine" class="status-line">Waiting for all 3 inputs.</div>
      <div id="equationDisplay" class="equation-display">—</div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
